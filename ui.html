<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <style>
    * { box-sizing: border-box; }
    body {
      font: 12px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 12px;
      color: var(--figma-color-text, #111);
      background: var(--figma-color-bg, #fff);
    }
    label { display: block; margin-bottom: 4px; opacity: 0.8; }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--figma-color-border, #ccc);
      border-radius: 6px;
      font: 13px ui-monospace, monospace;
      margin-bottom: 10px;
    }
    .row { display: flex; gap: 8px; margin-bottom: 8px; }
    button {
      flex: 1;
      padding: 8px 10px;
      border-radius: 6px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      background: var(--figma-color-bg-brand, #0d99ff);
      color: var(--figma-color-text-onbrand, #fff);
    }
    button.secondary {
      background: var(--figma-color-bg-secondary, #f0f0f0);
      color: var(--figma-color-text, #111);
    }
    p.hint { margin: 0 0 10px; font-size: 11px; opacity: 0.65; line-height: 1.35; }
  </style>
</head>
<body>
  <p class="hint"><strong>20×20 px</strong>, монохром. Прямоугольники: <strong>cornerRadius 4</strong>, <strong>cornerSmoothing 0.6</strong>. Обводка: <strong>2</strong>, <strong>round cap</strong>. Дуги — path из кубических Безье (≤90° на сегмент), точки на целой сетке. Сид — новая форма.</p>
  <label for="seed">Сид (пусто — случайный)</label>
  <input id="seed" type="text" placeholder="например billing-tab-v2" autocomplete="off"/>
  <div class="row">
    <button type="button" id="gen">Сгенерировать</button>
    <button type="button" class="secondary" id="rand">Новый сид</button>
  </div>
  <script>
    var seedEl = document.getElementById('seed');
    window.onmessage = function (event) {
      var pm = event.data.pluginMessage;
      if (pm && pm.type === 'seed' && pm.value) seedEl.value = pm.value;
    };
    document.getElementById('gen').onclick = function () {
      parent.postMessage({ pluginMessage: { type: 'generate', seed: seedEl.value.trim() } }, '*');
    };
    document.getElementById('rand').onclick = function () {
      parent.postMessage({ pluginMessage: { type: 'randomSeed' } }, '*');
    };
  </script>
</body>
</html>
